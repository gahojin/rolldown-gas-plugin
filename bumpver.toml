[bumpver]
current_version = "v2026.7.2"
version_pattern = "vYYYY.MM.INC0"
commit_message = "chore: bump version {old_version_pep440} -> {new_version_pep440}"
pre_commit_hook = ""
post_commit_hook = ""
commit = true
tag = false
push = false

[bumpver.file_patterns]
"package.json" = [
    '"version": "{pep440_version}"',
]
